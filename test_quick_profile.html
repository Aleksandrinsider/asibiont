<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест быстрой настройки профиля</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .required { color: red; }
        button { padding: 10px 20px; background: #068487; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #056b6e; }
        .notification { padding: 10px; margin: 10px 0; border-radius: 4px; display: none; }
        .error { background: #fee; color: #c33; border: 1px solid #fcc; }
        .success { background: #efe; color: #363; border: 1px solid #cfc; }
    </style>
</head>
<body>
    <h1>Тест быстрой настройки профиля</h1>

    <div id="notification" class="notification"></div>

    <form id="quick-profile-form">
        <div class="form-group">
            <label for="quick-city">Город</label>
            <input type="text" id="quick-city" placeholder="Например: Москва">
        </div>

        <div class="form-group">
            <label for="quick-birthdate">Дата рождения</label>
            <input type="text" id="quick-birthdate" placeholder="ДД.ММ.ГГГГ (например: 15.03.1990)" maxlength="10">
        </div>

        <div class="form-group">
            <label for="quick-company">Компания</label>
            <input type="text" id="quick-company" placeholder="Название компании">
        </div>

        <div class="form-group">
            <label for="quick-position">Должность</label>
            <input type="text" id="quick-position" placeholder="Ваша должность">
        </div>

        <div class="form-group">
            <label for="quick-interests">Интересы <span class="required">*</span></label>
            <input type="text" id="quick-interests" placeholder="Например: спорт, программирование, путешествия">
        </div>

        <div class="form-group">
            <label for="quick-skills">Навыки</label>
            <input type="text" id="quick-skills" placeholder="Например: Python, менеджмент, дизайн">
        </div>

        <div class="form-group">
            <label for="quick-goals">Цели</label>
            <textarea id="quick-goals" placeholder="Чего вы хотите достичь?"></textarea>
        </div>

        <button type="button" onclick="submitQuickProfile()">Сохранить</button>
    </form>

    <script>
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        function validateBirthdate(birthdate) {
            const regex = /^\d{2}\.\d{2}\.\d{4}$/;
            if (!regex.test(birthdate)) return false;

            const [day, month, year] = birthdate.split('.').map(Number);
            const date = new Date(year, month - 1, day);

            return date.getFullYear() === year &&
                   date.getMonth() === month - 1 &&
                   date.getDate() === day;
        }

        async function submitQuickProfile() {
            const city = document.getElementById('quick-city').value.trim();
            const birthdate = document.getElementById('quick-birthdate').value.trim();
            const company = document.getElementById('quick-company').value.trim();
            const position = document.getElementById('quick-position').value.trim();
            const interests = document.getElementById('quick-interests').value.trim();
            const skills = document.getElementById('quick-skills').value.trim();
            const goals = document.getElementById('quick-goals').value.trim();

            // Проверяем обязательные поля
            if (!interests) {
                showNotification('Укажите интересы', 'error');
                return;
            }

            // Проверяем формат даты рождения только если она указана
            if (birthdate && !validateBirthdate(birthdate)) {
                showNotification('Неверный формат даты рождения (ДД.ММ.ГГГГ)', 'error');
                return;
            }

            // Имитация успешного сохранения
            showNotification('Профиль успешно заполнен!', 'success');

            console.log('Данные профиля:', {
                city,
                birthdate,
                company,
                position,
                interests,
                skills,
                goals
            });
        }
    </script>
</body>
</html>
