    <style>
        * {

        html, body {

            background: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        body {
            display: flex;
            align-items: center;

            padding: 40px 15px;
        }
        .container {
            width: 100%;

        }

        .code {

            font-weight: 700;
            color: #1F2328;
            letter-spacing: -2px;

            margin-bottom: 16px;
        }
        .code span {
            color: #068487;
        }
        .title {

            font-weight: 600;
            color: #1F2328;
            margin-bottom: 12px;
        }
        .desc {

            color: #6C727F;
            line-height: 1.6;
            margin-bottom: 36px;
        }
        .actions {

            flex-direction: column;
            gap: 10px;

        }
        .btn-primary {

            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #1F2328;
            color: #FFFFFF;
            border: 1px solid #1F2328;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.15s, border-color 0.15s;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: #374151;
            border-color: #374151;
        }
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #FFFFFF;
            color: #374151;
            border: 1px solid #D1D9E0;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 400;
            text-decoration: none;
            transition: background 0.15s, border-color 0.15s;
            cursor: pointer;
        }
        .btn-secondary:hover {
            background: #F6F8FA;
            border-color: #8C959F;
        }
        .divider {
            width: 40px;
            height: 1px;
            background: #D1D9E0;
            margin: 28px auto;
        }
        .hint {
            font-size: 13px;
            color: #8C959F;
        }
        .hint a {
            color: #068487;
            text-decoration: none;
        }
        .hint a:hover {

        }
        @media (max-width: 480px) {
            .code {
                font-size: 56px;
            }
            .btn-primary, .btn-secondary {

</html>
