<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASI Biont - Доступ ограничен</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-header">
        <div class="header-content">
            <div class="header-left">
                <a href="https://t.me/{{bot_username}}" target="_blank" class="logo" style="display: flex; align-items: center; gap: 8px; text-decoration: none;">
                    <img src="/static/asibiont.svg?v=2" alt="ASI Biont" style="width: 28px; height: 28px;">
                    <span>ASI Biont</span>
                </a>
            </div>
            <div class="header-info">
                <a href="/logout" style="background: none; border: none; color: #656D76; font-size: 13px; cursor: pointer; padding: 8px 16px; font-family: inherit; transition: color 0.2s; text-decoration: none; display: flex; align-items: center;" onmouseover="this.style.color='#656D76'" onmouseout="this.style.color='#656D76'">Выход</a>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="welcome-section">
            <div class="welcome-content">
                <h1 style="margin-bottom: 20px; font-size: 24px; color: #656D76;">Доступ ограничен</h1>
                <p style="margin-bottom: 30px; color: #656D76; line-height: 1.4;">Для использования ASI Biont необходима активная подписка.</p>
                <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
                    <a href="https://t.me/{{bot_username}}" target="_blank" class="send-btn">Оформить подписку</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
