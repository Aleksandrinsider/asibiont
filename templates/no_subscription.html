<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASI Biont - Доступ ограничен</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container" style="margin-top: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="welcome-section" style="width: 100%; display: flex; justify-content: center;">
            <div class="welcome-content" style="border: 1px solid #D1D9E0; max-width: 520px; padding: 40px; width: 100%;">
                <div style="text-align: left; margin-bottom: 24px;">
                    <h1 style="margin: 0 0 16px 0; font-size: 24px; font-weight: 600; color: #374151;">Доступ ограничен</h1>
                    <p style="margin: 0; color: #374151; font-size: 14px; line-height: 1.5;">Для использования ASI Biont необходима активная подписка.</p>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <a href="https://t.me/{{bot_username}}" target="_blank" style="display: inline-block; padding: 8px 16px; background-color: #FFFFFF; color: #374151; text-decoration: none; border-radius: 6px; font-weight: 400; text-align: center; border: 1px solid #D1D9E0; transition: all 0.2s; font-size: 13px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;" onmouseover="this.style.background='#F6F8FA'; this.style.borderColor='#1F2328';" onmouseout="this.style.background='#FFFFFF'; this.style.borderColor='#D1D9E0';">Оформить подписку</a>
                    <a href="/logout" style="display: inline-block; padding: 8px 16px; background-color: #FFFFFF; color: #374151; text-decoration: none; border-radius: 6px; font-weight: 400; text-align: center; border: 1px solid #D1D9E0; transition: all 0.2s; font-size: 13px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;" onmouseover="this.style.background='#F6F8FA'; this.style.borderColor='#1F2328';" onmouseout="this.style.background='#FFFFFF'; this.style.borderColor='#D1D9E0';">Назад</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
