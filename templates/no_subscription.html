<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASI Biont - Доступ ограничен</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-header">
        <div class="header-content">
            <a href="https://t.me/asibiont_bot" target="_blank" class="logo">ASI Biont</a>
        </div>
    </div>
    <div class="no-subscription-section">
        <div class="no-subscription-content">
            <h1 style="margin-bottom: 20px; font-weight: normal;">Доступ ограничен</h1>
            <p style="margin-bottom: 20px;">Для использования ASI Biont необходима активная подписка.</p>
            <p style="margin-bottom: 20px;">Оформите подписку через Telegram-бот, чтобы получить доступ к управлению задачами, интеллектуальному ассистенту и поиску единомышленников!</p>
            <div class="button-group">
                <a href="https://t.me/{{bot_username}}" target="_blank" class="send-btn">Оформить подписку</a>
            </div>
            <p style="margin-top: 20px;"><a href="/logout" class="back-link">Выход</a></p>
        </div>
    </div>
</body>
</html>
