<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Task Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Вход через Telegram</h1>
        {% if local %}
        <p>Локальный режим: <a href="/test_login">Войти как тестовый пользователь</a></p>
        {% else %}
        <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-login="{{ bot_username }}" data-size="large" data-auth-url="/telegram_auth"></script>
        {% endif %}
    </div>
</body>
</html>
