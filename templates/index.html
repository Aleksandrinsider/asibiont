<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asibiont - Авторизация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        #telegram-login-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }
        .features {
            margin-top: 40px;
            text-align: left;
        }
        .feature {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            color: #555;
        }
        .feature-icon {
            width: 24px;
            height: 24px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-right: 12px;
            font-weight: bold;
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Asibiont</h1>
        <p>Ваш AI-ассистент для управления задачами</p>
        
        <div id="telegram-login-container">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="{{ BOT_USERNAME }}" 
                data-size="large" 
                data-auth-url="{{ AUTH_URL }}" 
                data-request-access="write">
            </script>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">✓</div>
                <div>Умное управление задачами с AI</div>
            </div>
            <div class="feature">
                <div class="feature-icon">✓</div>
                <div>Напоминания и уведомления</div>
            </div>
            <div class="feature">
                <div class="feature-icon">✓</div>
                <div>Делегирование задач</div>
            </div>
            <div class="feature">
                <div class="feature-icon">✓</div>
                <div>Аналитика продуктивности</div>
            </div>
        </div>

        <div class="footer">
            © 2026 Asibiont. Все права защищены.
        </div>
    </div>
</body>
</html>
